<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="bg">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
    <radialGradient id="glow" cx="62%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#bg)">
    <!-- Background -->
    <rect width="512" height="512" fill="#181818"/>

    <!-- Film strip — top -->
    <rect x="0" y="0" width="512" height="70" fill="#0d0d0d"/>
    <rect x="32"  y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="100" y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="168" y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="236" y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="304" y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="372" y="17" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="440" y="17" width="36" height="36" rx="6" fill="#181818"/>

    <!-- Film strip — bottom -->
    <rect x="0" y="442" width="512" height="70" fill="#0d0d0d"/>
    <rect x="32"  y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="100" y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="168" y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="236" y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="304" y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="372" y="459" width="36" height="36" rx="6" fill="#181818"/>
    <rect x="440" y="459" width="36" height="36" rx="6" fill="#181818"/>

    <!-- Radial glow -->
    <rect width="512" height="512" fill="url(#glow)"/>

    <!-- Play triangle -->
    <polygon points="112,182 112,330 248,256" fill="#ffffff"/>

    <!-- Stream arc 1 — closest -->
    <path d="M 248,191 A 65,65 0 0,1 248,321"
          fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round"/>

    <!-- Stream arc 2 — medium -->
    <path d="M 248,146 A 110,110 0 0,1 248,366"
          fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" opacity="0.65"/>

    <!-- Stream arc 3 — outermost -->
    <path d="M 248,101 A 155,155 0 0,1 248,411"
          fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
